org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Run module compilation tasks in parallel across all CPU cores
org.gradle.parallel=true

# Reuse task outputs from previous builds (speeds up incremental builds)
org.gradle.caching=true

# R8 full mode: enables whole-program optimisation beyond basic shrinking.
# Required to get the most out of isMinifyEnabled=true in release builds.
android.enableR8.fullMode=true

# Incremental Kotlin compilation — avoids full recompile on small changes
kotlin.incremental=true
