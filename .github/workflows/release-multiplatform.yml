name: Release multi-platform

"on":
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.1.0). If empty uses commit SHA.'
        required: false

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.24.5'

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Placeholder google-services.json
        run: |
          if [ ! -f android/app/google-services.json ]; then
            echo '{}' > android/app/google-services.json
          fi
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: portfolio-admin-android
          path: build/app/outputs/flutter-apk/app-release.apk

  ios:
    name: iOS unsigned .app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Placeholder GoogleService-Info.plist
        run: |
          if [ ! -f ios/Runner/GoogleService-Info.plist ]; then
            touch ios/Runner/GoogleService-Info.plist
          fi
      - run: flutter pub get
      - run: flutter precache --ios
      - name: Build iOS without code signing
        run: flutter build ios --release --no-codesign
      - name: Zip the .app bundle
        run: |
          cd build/ios/iphoneos
          zip -r ../../../portfolio-admin-ios-unsigned.zip Runner.app
      - uses: actions/upload-artifact@v4
        with:
          name: portfolio-admin-ios
          path: portfolio-admin-ios-unsigned.zip

  linux:
    name: Linux x64 (best effort)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install Linux desktop deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev libjsoncpp-dev
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - name: Build Linux bundle (may fail on Firebase Linux gap)
        continue-on-error: true
        run: flutter build linux --release
      - name: Package bundle if built
        continue-on-error: true
        run: |
          if [ -d build/linux/x64/release/bundle ]; then
            cd build/linux/x64/release
            tar czf "$GITHUB_WORKSPACE/portfolio-admin-linux-x64.tar.gz" bundle
          fi
      - uses: actions/upload-artifact@v4
        if: hashFiles('portfolio-admin-linux-x64.tar.gz') != ''
        with:
          name: portfolio-admin-linux
          path: portfolio-admin-linux-x64.tar.gz

  release:
    name: Attach to GitHub Release
    needs: [android, ios, linux]
    if: always() && (needs.android.result == 'success' || needs.ios.result == 'success' || needs.linux.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Resolve tag
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v0.0.0-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          REPO="${GITHUB_REPOSITORY}"
          gh release view "$TAG" -R "$REPO" >/dev/null 2>&1 || \
            gh release create "$TAG" -R "$REPO" \
              --title "Release $TAG" \
              --notes "Multi-platform build. Android APK, iOS unsigned .app, Linux x64 when supported."
          if [ -f artifacts/portfolio-admin-android/app-release.apk ]; then
            cp artifacts/portfolio-admin-android/app-release.apk portfolio-admin.apk
            gh release upload "$TAG" portfolio-admin.apk -R "$REPO" --clobber
          fi
          if [ -f artifacts/portfolio-admin-ios/portfolio-admin-ios-unsigned.zip ]; then
            gh release upload "$TAG" artifacts/portfolio-admin-ios/portfolio-admin-ios-unsigned.zip -R "$REPO" --clobber
          fi
          if [ -f artifacts/portfolio-admin-linux/portfolio-admin-linux-x64.tar.gz ]; then
            gh release upload "$TAG" artifacts/portfolio-admin-linux/portfolio-admin-linux-x64.tar.gz -R "$REPO" --clobber
          fi
