name: Build and Release APK

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v2.0.1, v2.1.0, etc.

jobs:
  build-and-release:
    name: Build APK and Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests (optional)
        run: flutter test || echo "No tests configured"
        continue-on-error: true

      - name: Build APK
        run: flutter build apk --release

      - name: Get version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk portfolio-admin-v${{ steps.version.outputs.version }}.apk
          ls -lh portfolio-admin-v${{ steps.version.outputs.version }}.apk

      - name: Generate Release Notes
        id: release_notes
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          # Create release notes
          cat > release_notes.md <<'EOF'
          ## 🎮 Portfolio Admin App - ${{ steps.version.outputs.version }}

          ### 📦 Downloads
          - **APK Size**: $(ls -lh portfolio-admin-v${{ steps.version.outputs.version }}.apk | awk '{print $5}')
          - **Min Android**: 7.0 (API 24)
          - **Target Android**: 14 (API 34)

          ### 🚀 Installation
          1. Download the APK below
          2. Enable "Install from Unknown Sources" in Android Settings
          3. Install and launch the app

          Or use ADB:
          ```bash
          adb install portfolio-admin-v${{ steps.version.outputs.version }}.apk
          ```

          ### 📝 What's New
          See commit history for detailed changes.

          ### 🏗️ Build Info
          - Built: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref_name }}
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: portfolio-admin-v${{ steps.version.outputs.version }}.apk
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: true  # Auto-generate notes from commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-admin-v${{ steps.version.outputs.version }}
          path: portfolio-admin-v${{ steps.version.outputs.version }}.apk
          retention-days: 90
