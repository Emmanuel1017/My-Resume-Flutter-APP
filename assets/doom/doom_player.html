<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DOOM Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #eee;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      touch-action: none;
    }
    #jsdos {
      width: 100%;
      height: 100%;
      display: none;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #00ff41;
      font-size: 1.1rem;
      padding: 2rem;
      z-index: 10;
      text-shadow: 0 0 10px #00ff41;
      max-width: 90%;
    }
    .error {
      color: #c41e1e;
      text-shadow: 0 0 10px #c41e1e;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .spinner {
      border: 4px solid #333;
      border-top: 4px solid #00ff41;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>WAITING FOR JS-DOS...</div>
  </div>
  <div id="jsdos"></div>

  <script>
    const loading = document.getElementById('loading');
    const jsdosDiv = document.getElementById('jsdos');
    let dosInstance = null;

    function updateLoading(message, isError = false) {
      if (isError) {
        loading.innerHTML = '<div class="error">' + message + '</div>';
      } else {
        loading.innerHTML = '<div class="spinner"></div><div>' + message + '</div>';
      }
    }

    function base64ToArrayBuffer(base64) {
      const binaryString = atob(base64);
      const len = binaryString.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      return bytes;
    }

    // Wait for WAD data from Flutter (Flutter will inject js-dos library first)
    window.startDoom = async function() {
      const gameTitle = window.gameTitle || 'DOOM';
      const wadBase64 = window.wadData;

      console.log('[DOOM HTML] startDoom called');
      console.log('[DOOM HTML] gameTitle:', gameTitle);
      console.log('[DOOM HTML] wadData length:', wadBase64 ? wadBase64.length : 'undefined');
      console.log('[DOOM HTML] typeof Dos:', typeof Dos);

      if (!wadBase64) {
        updateLoading('ERROR: No WAD data received from Flutter', true);
        return;
      }

      try {
        // Check if js-dos loaded
        if (typeof Dos === 'undefined') {
          updateLoading(
            'ERROR: js-dos library not loaded<br><br>' +
            'Flutter should have injected the js-dos library.<br>' +
            'This is a critical error.',
            true
          );
          return;
        }

        updateLoading('CONVERTING BUNDLE FOR ' + gameTitle + '...');

        // Convert base64 to blob
        const wadData = base64ToArrayBuffer(wadBase64);
        const blob = new Blob([wadData], { type: 'application/octet-stream' });
        const blobUrl = URL.createObjectURL(blob);

        console.log('[DOOM HTML] Created blob URL:', blobUrl);
        console.log('[DOOM HTML] Blob size:', blob.size, 'bytes');

        updateLoading('INITIALIZING DOS EMULATOR...');

        // Create WASM URL from injected data if available
        let wdosboxUrl = "https://js-dos.com/v7/build/wdosbox.wasm.js";
        if (window.wdosboxWasmData) {
          console.log('[DOOM HTML] Using injected wdosbox.wasm data');
          const wasmData = base64ToArrayBuffer(window.wdosboxWasmData);
          const wasmBlob = new Blob([wasmData], { type: 'application/wasm' });
          wdosboxUrl = URL.createObjectURL(wasmBlob);
        }

        // Initialize js-dos
        dosInstance = Dos(jsdosDiv, {
          wdosboxUrl: wdosboxUrl,
        });

        console.log('[DOOM HTML] Dos instance created');

        dosInstance.ready((fs, main) => {
          console.log('[DOOM HTML] Dos ready, extracting bundle...');
          updateLoading('EXTRACTING ' + gameTitle + ' FILES...');

          fs.extract(blobUrl).then(() => {
            console.log('[DOOM HTML] Bundle extracted, starting game...');
            updateLoading('STARTING ' + gameTitle + '...');

            // Hide loading, show game
            setTimeout(() => {
              loading.style.display = 'none';
              jsdosDiv.style.display = 'block';
            }, 500);

            // Start DOOM
            // The .jsdos bundle contains the game and autostart config
            main([]);

          }).catch(err => {
            console.error('[DOOM HTML] Extract error:', err);
            updateLoading(
              'ERROR EXTRACTING BUNDLE:<br><br>' +
              err.message + '<br><br>' +
              'The .jsdos file may be corrupted or invalid.',
              true
            );
          });
        });

      } catch (err) {
        console.error('[DOOM HTML] Error:', err);
        updateLoading(
          'ERROR LOADING GAME:<br><br>' +
          err.message + '<br><br>' +
          err.stack,
          true
        );
      }
    };

    console.log('[DOOM HTML] Page loaded');
    console.log('[DOOM HTML] Waiting for Flutter to inject js-dos library and call startDoom()...');
  </script>
</body>
</html>
