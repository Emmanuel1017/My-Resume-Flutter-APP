<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DOOM Player</title>

  <!-- Load js-dos library from GitHub (cached after first load) -->
  <script src="https://raw.githubusercontent.com/Emmanuel1017/Angular-Resume/master/src/assets/doom/js-dos.js"></script>
  <script src="https://raw.githubusercontent.com/Emmanuel1017/Angular-Resume/master/src/assets/doom/wdosbox.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, canvas, #jsdos {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      background: #000;
      color: #eee;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      touch-action: none;
    }
    canvas {
      display: block;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
    }
    #jsdos {
      display: none;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #00ff41;
      font-size: 1.1rem;
      padding: 2rem;
      z-index: 10;
      text-shadow: 0 0 10px #00ff41;
      max-width: 90%;
    }
    .error {
      color: #c41e1e;
      text-shadow: 0 0 10px #c41e1e;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .spinner {
      border: 4px solid #333;
      border-top: 4px solid #00ff41;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>LOADING JS-DOS...</div>
  </div>
  <canvas id="jsdos"></canvas>

  <script>
    const loading = document.getElementById('loading');
    const jsdosCanvas = document.getElementById('jsdos');
    let dosInstance = null;

    function updateLoading(message, isError = false) {
      if (isError) {
        loading.innerHTML = '<div class="error">' + message + '</div>';
      } else {
        loading.innerHTML = '<div class="spinner"></div><div>' + message + '</div>';
      }
    }

    function base64ToArrayBuffer(base64) {
      const binaryString = atob(base64);
      const len = binaryString.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      return bytes;
    }

    // Wait for scripts and WAD data from Flutter
    window.startDoom = function() {
      const gameTitle = window.gameTitle || 'DOOM';
      const wadBase64 = window.wadData;

      console.log('[DOOM HTML] startDoom called');
      console.log('[DOOM HTML] gameTitle:', gameTitle);
      console.log('[DOOM HTML] wadData length:', wadBase64 ? wadBase64.length : 'undefined');
      console.log('[DOOM HTML] typeof Dos:', typeof Dos);
      console.log('[DOOM HTML] typeof WDOSBOX:', typeof WDOSBOX);

      if (!wadBase64) {
        updateLoading('ERROR: No WAD data received', true);
        return;
      }

      if (typeof Dos !== 'function') {
        updateLoading(
          'ERROR: js-dos not loaded<br><br>' +
          'typeof Dos: ' + (typeof Dos) + '<br><br>' +
          'Check internet connection.',
          true
        );
        return;
      }

      try {
        updateLoading('CONVERTING BUNDLE...');

        const wadData = base64ToArrayBuffer(wadBase64);
        const blob = new Blob([wadData], { type: 'application/octet-stream' });
        const blobUrl = URL.createObjectURL(blob);

        console.log('[DOOM HTML] Blob URL:', blobUrl, 'Size:', blob.size);

        updateLoading('INITIALIZING EMULATOR...');

        dosInstance = Dos(jsdosCanvas, {});

        console.log('[DOOM HTML] Dos instance:', dosInstance);
        console.log('[DOOM HTML] ready type:', typeof dosInstance.ready);

        if (typeof dosInstance.ready !== 'function') {
          throw new Error('Dos().ready not a function. Got: ' + typeof dosInstance.ready);
        }

        dosInstance.ready(function(fs, main) {
          console.log('[DOOM HTML] Ready! Extracting...');
          updateLoading('EXTRACTING FILES...');

          fs.extract(blobUrl).then(function() {
            console.log('[DOOM HTML] Extracted! Starting...');
            updateLoading('STARTING ' + gameTitle + '...');

            setTimeout(function() {
              loading.style.display = 'none';
              jsdosCanvas.style.display = 'block';
            }, 500);

            main([]).then(function(ci) {
              console.log('[DOOM HTML] Started!');
              window.ci = ci;
            }).catch(function(err) {
              console.error('[DOOM HTML] Main error:', err);
              updateLoading('ERROR STARTING:<br>' + err.message, true);
              loading.style.display = 'block';
            });

          }).catch(function(err) {
            console.error('[DOOM HTML] Extract error:', err);
            updateLoading('ERROR EXTRACTING:<br>' + err.message, true);
          });
        });

      } catch (err) {
        console.error('[DOOM HTML] Error:', err);
        updateLoading('ERROR:<br>' + err.message + '<br>' + (err.stack || ''), true);
      }
    };

    console.log('[DOOM HTML] Page loaded, checking scripts...');
    console.log('[DOOM HTML] typeof Dos:', typeof Dos);

    // Give scripts time to load, then check
    setTimeout(function() {
      if (typeof Dos !== 'function') {
        updateLoading(
          'WAITING FOR JS-DOS LIBRARY...<br><br>' +
          'Loading from GitHub...<br>' +
          'This requires internet connection.',
          false
        );
      }
    }, 1000);
  </script>
</body>
</html>
