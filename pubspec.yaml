name: portfolio_admin
description: Portfolio viewer + admin panel for Korir Emmanuel's site.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.3
  cloud_firestore: ^5.2.1
  firebase_remote_config: ^5.1.3
  firebase_messaging: ^15.1.1
  flutter_local_notifications: ^17.2.3
  cached_network_image: ^3.3.1
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.3.0
  url_launcher: ^6.3.1
  http: ^1.2.0
  shared_preferences: ^2.3.0
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Generates all the mipmap-* PNGs from a single source image. Run with:
  #   dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

# ── Launcher icon ──────────────────────────────────────────────────────────────
# Source image lives at assets/branding/icon.png (the Angular site's Caribou
# Devs logo at 512×512). Adaptive icon uses a mint-green background so the
# silhouette reads on Android 8+ rounded/square launcher masks.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/branding/icon.png"
  adaptive_icon_background: "#161D2E"
  adaptive_icon_foreground: "assets/branding/icon.png"
  windows:
    generate: true
    image_path: "assets/branding/icon.png"
